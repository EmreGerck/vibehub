name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend type-check ────────────────────────────────────────────────────────
  backend-check:
    name: Backend — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --config jest.config.ts --passWithNoTests --ci

      - name: Lint
        run: npm run lint || true   # lint warnings don't block CI yet

  # ── Frontend type-check ───────────────────────────────────────────────────────
  frontend-check:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build check
        run: npm run build
        env:
          # Provide dummy values so build doesn't fail on missing env
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_SENTRY_DSN: ''

  # ── Security scan ─────────────────────────────────────────────────────────────
  security-audit:
    name: Security — npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high || true   # report only, don't fail build

      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true
