name: Daily Backup Verification

on:
  schedule:
    # Run at 03:00 UTC daily — 1 hour after the backup cron (02:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:   # also allow manual trigger

jobs:
  verify-backup:
    name: Verify Latest Backup Exists
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id     ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region        auto

      - name: Check backup from last 24h exists
        run: |
          ENDPOINT="${{ secrets.R2_ENDPOINT }}"
          BUCKET="${{ secrets.R2_BUCKET }}"
          YESTERDAY=$(date -u -d "24 hours ago" '+%Y%m%d' 2>/dev/null || date -u -v '-24H' '+%Y%m%d')

          echo "Looking for backup with prefix: backups/vibehub_${YESTERDAY}"

          COUNT=$(aws s3 ls "s3://${BUCKET}/backups/" \
            --endpoint-url "$ENDPOINT" \
            | grep "vibehub_${YESTERDAY}" | wc -l)

          if [[ "$COUNT" -eq 0 ]]; then
            echo "❌ No backup found for ${YESTERDAY}!"
            exit 1
          else
            echo "✅ Found ${COUNT} backup file(s) for ${YESTERDAY}"
          fi

      - name: List recent backups
        run: |
          aws s3 ls "s3://${{ secrets.R2_BUCKET }}/backups/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            --human-readable | tail -7
